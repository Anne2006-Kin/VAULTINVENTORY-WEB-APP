<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Warehouse Inventory System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }

        .header i {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 13px;
        }

        .body {
            padding: 35px 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #f56565;
        }

        .form-group input.valid {
            border-color: #48bb78;
        }

        .error-message {
            color: #f56565;
            font-size: 11px;
            margin-top: 5px;
            display: block;
        }

        .valid-message {
            color: #48bb78;
            font-size: 11px;
            margin-top: 5px;
            display: block;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: #718096;
        }

        .terms-group {
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .terms-group input[type="checkbox"] {
            margin-top: 2px;
            cursor: pointer;
        }

        .terms-group label {
            font-size: 13px;
            color: #4a5568;
            cursor: pointer;
        }

        .terms-group a {
            color: #667eea;
            text-decoration: none;
        }

        .terms-group a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
            color: #4a5568;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            z-index: 10;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .header {
                padding: 25px 20px;
            }
            .body {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <i class="fas fa-user-plus"></i>
                <h1>Create Account</h1>
                <p>Join us to manage your warehouse efficiently</p>
            </div>
            <div class="body">
                <div id="alertContainer"></div>
                
                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="firstName" placeholder="First Name">
                            <div class="error-message" id="firstNameError"></div>
                        </div>

                        <div class="form-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="lastName" placeholder="Last Name">
                            <div class="error-message" id="lastNameError"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="username" placeholder="Username (min 3 characters)">
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email Address">
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password (min 6 characters)">
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password">
                        <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>

                    <div class="terms-group">
                        <input type="checkbox" id="terms">
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-register" id="registerBtn">
                        <span id="btnText">Create Account</span>
                        <span id="btnLoader" style="display: none;">
                            <span class="loading-spinner"></span> Creating account...
                        </span>
                    </button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'http://localhost:8080/api';
        
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        // Password strength checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            let message = '';
            let color = '';
            
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            switch(strength) {
                case 0:
                case 1:
                    message = 'Very Weak';
                    color = '#f56565';
                    break;
                case 2:
                    message = 'Weak';
                    color = '#ed8936';
                    break;
                case 3:
                    message = 'Fair';
                    color = '#ecc94b';
                    break;
                case 4:
                    message = 'Good';
                    color = '#48bb78';
                    break;
                case 5:
                    message = 'Strong';
                    color = '#38a169';
                    break;
            }
            
            const width = (strength / 5) * 100;
            strengthBar.style.width = width + '%';
            strengthBar.style.background = color;
            strengthText.textContent = message;
            strengthText.style.color = color;
        });
        
        // Real-time validation
        document.getElementById('username').addEventListener('input', validateUsername);
        document.getElementById('email').addEventListener('input', validateEmail);
        document.getElementById('confirmPassword').addEventListener('input', validateConfirmPassword);
        
        function validateUsername() {
            const username = document.getElementById('username').value;
            const errorDiv = document.getElementById('usernameError');
            const input = document.getElementById('username');
            
            if (username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                input.classList.add('error');
                input.classList.remove('valid');
                return false;
            } else if (username.length > 20) {
                errorDiv.textContent = 'Username must be less than 20 characters';
                input.classList.add('error');
                input.classList.remove('valid');
                return false;
            } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorDiv.textContent = 'Username can only contain letters, numbers, and underscores';
                input.classList.add('error');
                input.classList.remove('valid');
                return false;
            } else {
                errorDiv.textContent = '';
                input.classList.remove('error');
                input.classList.add('valid');
                return true;
            }
        }
        
        function validateEmail() {
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('emailError');
            const input = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                input.classList.add('error');
                input.classList.remove('valid');
                return false;
            } else {
                errorDiv.textContent = '';
                input.classList.remove('error');
                input.classList.add('valid');
                return true;
            }
        }
        
        function validateConfirmPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('confirmPasswordError');
            const input = document.getElementById('confirmPassword');
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                input.classList.add('error');
                input.classList.remove('valid');
                return false;
            } else if (confirmPassword.length > 0 && password === confirmPassword) {
                errorDiv.textContent = '';
                input.classList.remove('error');
                input.classList.add('valid');
                return true;
            }
            return true;
        }
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous errors
            clearErrors();
            
            // Get values
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const fullName = firstName && lastName ? `${firstName} ${lastName}` : (firstName || lastName);
            
            // Validate
            let isValid = true;
            
            if (!username) {
                showError('usernameError', 'Username is required');
                isValid = false;
            } else if (!validateUsername()) isValid = false;
            
            if (!email) {
                showError('emailError', 'Email is required');
                isValid = false;
            } else if (!validateEmail()) isValid = false;
            
            if (!password) {
                showError('passwordError', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters');
                isValid = false;
            }
            
            if (!confirmPassword) {
                showError('confirmPasswordError', 'Please confirm your password');
                isValid = false;
            } else if (password !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                isValid = false;
            }
            
            if (!terms) {
                showAlert('Please accept the Terms of Service', 'error');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Show loading state
            setLoading(true);
            
            try {
                // Make API call to register
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        full_name: fullName
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(data.message || 'Registration successful! Redirecting to login...', 'success');
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed. Please try again.', 'error');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Unable to connect to server. Please check if the backend is running.', 'error');
                setLoading(false);
            }
        });
        
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            const input = element.closest('.form-group')?.querySelector('input');
            if (input) input.classList.add('error');
        }
        
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('input').forEach(el => {
                el.classList.remove('error');
                if (el.value && (el.id === 'username' || el.id === 'email' || el.id === 'confirmPassword')) {
                    el.classList.add('valid');
                }
            });
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.opacity = '0';
                setTimeout(() => alertDiv.remove(), 300);
            }, 5000);
        }
        
        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            if (loading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                btnLoader.style.display = 'inline-flex';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
